name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '10'
            illuminate: '^10.0'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '11'
            illuminate: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '12'
            illuminate: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '12'
            illuminate: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '13'
            illuminate: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '13'
            illuminate: '^13.0'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '13'
            illuminate: '^13.0'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Allow legacy Laravel advisory resolution
        if: matrix.laravel == '10' || matrix.laravel == '11'
        run: composer config policy.advisories.block false

      - name: Configure Laravel version
        run: |
          composer require \
            "illuminate/support:${{ matrix.illuminate }}" \
            "illuminate/filesystem:${{ matrix.illuminate }}" \
            "illuminate/http:${{ matrix.illuminate }}" \
            --no-update \
            --no-interaction
          composer require \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --dev \
            --no-update \
            --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test
